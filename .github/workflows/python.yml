name: Ligando o Python

on:
  push:
  pull_request:

jobs:
  Python:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código (checkout)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Ver arquivos
        run: ls -R

      - name: Executar o programa
        run: |
          pwd
          python app.py
